<!DOCTYPE html>
<html lang="si">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password — Zodovia</title>
    <meta name="robots" content="noindex, nofollow">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+Sinhala:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/style.css?v=7">
</head>
<body class="page-home lang-si">

<nav class="navbar">
    <div class="nav-inner">
        <a class="logo" href="/">✨ Zodovia</a>
        <div class="nav-links">
            <a href="/" class="btn btn-ghost" data-i18n="nav_back_home">Back to Home</a>
            <button class="lang-toggle" onclick="toggleLang()" title="Switch to English">EN</button>
        </div>
    </div>
</nav>

<section class="section" style="min-height:80vh;display:flex;align-items:center;">
    <div class="container container-sm">
        <div class="auth-card" style="max-width:440px;margin:0 auto;background:var(--card-bg,#1a0533);border:1px solid rgba(212,175,55,0.25);border-radius:16px;padding:40px 36px;">
            <div style="text-align:center;margin-bottom:28px;">
                <div style="font-size:2rem;margin-bottom:8px;">🔑</div>
                <h1 style="font-size:1.5rem;margin:0 0 8px;" data-i18n="forgot_title">Forgot Your Password?</h1>
                <p style="color:var(--text-muted);margin:0;font-size:0.9rem;" data-i18n="forgot_sub">Enter your email and we'll send you a reset link.</p>
            </div>

            <form id="forgotForm">
                <div class="form-group">
                    <label for="email" data-i18n="forgot_email_label">Email Address</label>
                    <input type="email" id="email" name="email" required
                           placeholder="you@example.com" autocomplete="email"
                           style="width:100%;box-sizing:border-box;">
                </div>
                <div id="formMsg" class="hidden" style="margin:12px 0;padding:12px 16px;border-radius:8px;font-size:0.88rem;"></div>
                <button type="submit" class="btn btn-primary btn-full" id="submitBtn" data-i18n="forgot_submit">
                    Send Reset Link ✨
                </button>
            </form>

            <p style="text-align:center;margin-top:20px;font-size:0.85rem;color:var(--text-muted);">
                <span data-i18n="forgot_remember">Remember it?</span> <a href="/" style="color:var(--gold);" data-i18n="forgot_sign_in">Sign in here →</a>
            </p>
        </div>
    </div>
</section>

<footer class="footer">
    <div class="container">
        <div class="footer-links">
            <a href="/terms" data-i18n="footer_terms">Terms of Service</a>
            <a href="/privacy" data-i18n="footer_privacy">Privacy Policy</a>
        </div>
        <p class="footer-copy" data-i18n="footer_copy_simple">© 2026 Zodovia. All rights reserved.</p>
    </div>
</footer>

<script src="/static/js/i18n.js?v=1"></script>
<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const msg = document.getElementById('formMsg');
    const email = document.getElementById('email').value.trim();

    btn.disabled = true;
    btn.textContent = window.t ? window.t('forgot_submit') : 'Sending…';
    msg.classList.add('hidden');

    try {
        const res = await fetch('/api/users/forgot-password', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ email }),
        });

        // Always show success — never reveal whether email exists
        msg.textContent = window.t ? window.t('forgot_success_msg') : 'If that email is registered, you\'ll receive a reset link within a minute. Check your inbox (and spam folder).';
        msg.style.background = 'rgba(74,222,128,0.1)';
        msg.style.border = '1px solid rgba(74,222,128,0.3)';
        msg.style.color = '#4ade80';
        msg.classList.remove('hidden');
        btn.textContent = window.t ? window.t('forgot_link_sent_btn') : 'Link Sent ✓';
    } catch (err) {
        msg.textContent = window.t ? window.t('forgot_error_msg') : 'Something went wrong. Please try again.';
        msg.style.background = 'rgba(255,128,128,0.1)';
        msg.style.border = '1px solid rgba(255,128,128,0.3)';
        msg.style.color = '#ff8080';
        msg.classList.remove('hidden');
        btn.disabled = false;
        btn.textContent = window.t ? window.t('forgot_submit') : 'Send Reset Link ✨';
    }
});
</script>
</body>
</html>
